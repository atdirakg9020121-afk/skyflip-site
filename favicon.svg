<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fa8e8"/>
      <stop offset="1" stop-color="#a9d4f5"/>
    </linearGradient>
  </defs>
  <!-- 空の背景 -->
  <rect width="64" height="64" rx="14" fill="url(#sky)"/>
  <!-- フリップ時計（中央の分割パネル） -->
  <rect x="16" y="20" width="32" height="24" rx="4" fill="#1f2933"/>
  <line x1="16" y1="32" x2="48" y2="32" stroke="#5fa8e8" stroke-width="1.5"/>
  <!-- 数字っぽいスリット -->
  <rect x="21" y="25" width="8" height="3" rx="1.5" fill="#cfe6fb"/>
  <rect x="35" y="25" width="8" height="3" rx="1.5" fill="#cfe6fb"/>
  <!-- 雲 -->
  <g fill="#ffffff" opacity="0.95">
    <circle cx="44" cy="14" r="5"/>
    <circle cx="50" cy="15" r="4"/>
    <circle cx="39" cy="16" r="4"/>
  </g>
</svg>
